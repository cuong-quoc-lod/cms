name: CI Pipeline

on:
  push:
    branches:
      - main
      - dev
      - 'feat/*'
  pull_request:
    branches:
      - main
      - dev

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest flake8

      - name: Lint code
        run: |
          flake8 backend/src --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 backend/src --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run tests
        run: |
          pytest backend || echo "No tests or pytest passed"

      - name: Build Backend (Docker)
        run: |
          cd backend
          docker build -t cms-backend:latest .

  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint code
        working-directory: frontend
        run: npm run lint --if-present || true

      - name: Run tests
        working-directory: frontend
        run: npm test -- --passWithNoTests --watchAll=false

      - name: Build Frontend
        working-directory: frontend
        run: npm run build
